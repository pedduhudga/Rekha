
<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Rekha 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at center, #1a1115, #000);
  color: white;
  overflow: hidden;
}section { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }

h1 { font-family: 'Playfair Display', serif; color: gold; }

/* FIRST PAGE PHOTO */ .start-img { width: 180px; height: 180px; border-radius: 50%; border: 5px solid #ff7eb3; box-shadow: 0 0 25px #ff7eb3; overflow: hidden; margin-bottom: 20px; } .start-img img { width:100%; height:100%; object-fit:cover; }

button { padding: 12px 30px; border-radius: 30px; border: none; background: linear-gradient(45deg,#ff7eb3,#8b5cf6); color: white; font-size: 1rem; }

/* TOP ROUND PHOTO */ .top-photo { position: absolute; top: 20px; width: 120px; height: 120px; border-radius: 50%; border: 4px solid #ff7eb3; box-shadow: 0 0 20px #ff7eb3; overflow: hidden; } .top-photo img { width:100%; height:100%; object-fit:cover; }

/* GALLERY */ .gallery { position: relative; width: 100%; height: 300px; margin-top: 30px; display: flex; align-items: center; justify-content: center; }

.card { position: absolute; width: 200px; height: 260px; border-radius: 20px; overflow: hidden; border: 4px solid #ff7eb3; box-shadow: 0 0 20px #ff7eb3; transition: 0.5s; }

.card img { width:100%; height:100%; object-fit:cover; }

/* FULL VIEW */ .viewer { position: fixed; top:0;left:0; width:100%;height:100%; background:black; display:none; align-items:center; justify-content:center; } .viewer img { width:90%; border-radius:20px; }

.hidden { display:none; } </style>

</head>
<body><!-- PAGE 1 --><section id="start">
  <div class="start-img">
    <img src="IMG-20251110-WA0009.jpg">
  </div>
  <h1>🎁 A Surprise</h1>
  <button onclick="openPage()">Open</button>
</section><!-- PAGE 2 --><section id="main" class="hidden">  <div class="top-photo">
    <img src="IMG-20251110-WA0009.jpg">
  </div>  <h1 style="margin-top:140px">Rekha</h1>  <p>
    Dear Rekha,<br><br>
    Wishing you a day filled with joy, laughter, and beautiful moments 🌸<br>
    May every smile today turn into a wonderful memory 💕<br>
    May happiness follow you wherever you go ✨<br><br>
    Keep shining bright and enjoying every moment ⭐<br>
    This day is all about celebrating you 🎉💫
  </p>  <div class="gallery" id="gallery">
    <div class="card"><img src="IMG-20251110-WA0009.jpg"></div>
    <div class="card"><img src="IMG-20251203-WA0119.jpg"></div>
    <div class="card"><img src="IMG_20250916_154443_953.jpg"></div>
    <div class="card"><img src="IMG_20250916_154446_467.jpg"></div>
    <div class="card"><img src="IMG_20251011_234058_532.jpg"></div>
  </div>
</section><!-- FULL VIEW --><div class="viewer" id="viewer" onclick="closeViewer()">
  <img id="viewImg">
</div><script>
function openPage(){
  document.getElementById('start').classList.add('hidden');
  document.getElementById('main').classList.remove('hidden');
  arrange();
}

function arrange(){
  let cards=document.querySelectorAll('.card');
  cards.forEach((c,i)=>{
    c.style.transform=`translateX(${(i-2)*120}px) scale(${i==2?1.2:0.8})`;
    c.style.zIndex=i==2?5:1;

    c.onclick=()=>openViewer(c.querySelector('img').src);
  });
}

function openViewer(src){
  document.getElementById('viewer').style.display='flex';
  document.getElementById('viewImg').src=src;
}

function closeViewer(){
  document.getElementById('viewer').style.display='none';
}

// SWIPE
let startX=0;
document.getElementById('gallery').addEventListener('touchstart',e=>{
  startX=e.touches[0].clientX;
});

document.getElementById('gallery').addEventListener('touchend',e=>{
  let endX=e.changedTouches[0].clientX;
  if(startX-endX>50) rotate(1);
  if(endX-startX>50) rotate(-1);
});

let index=0;
function rotate(dir){
  let cards=[...document.querySelectorAll('.card')];
  index=(index+dir+cards.length)%cards.length;
  cards.forEach((c,i)=>{
    let pos=(i-index+cards.length)%cards.length;
    let offset=pos-2;
    c.style.transform=`translateX(${offset*120}px) scale(${pos==2?1.2:0.8})`;
    c.style.zIndex=pos==2?5:1;
  });
}
</script></body>
</html>
