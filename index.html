<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Rekha 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle,#12080c,#000);
  color:white;
  overflow:hidden;
}

/* LAYOUT */
.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-between;
  padding:20px 10px;
  box-sizing:border-box;
}

/* TOP PHOTO */
.top-photo{
  width:100px;
  height:100px;
  border-radius:50%;
  border:4px solid #ff7eb3;
  box-shadow:0 0 25px #ff7eb3;
  overflow:hidden;
}
.top-photo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TEXT */
.text{
  text-align:center;
  max-width:320px;
}

.text h1{
  font-family:'Playfair Display';
  color:gold;
  margin:10px 0;
}

.text p{
  font-size:14px;
  line-height:1.5;
}

/* GALLERY */
.gallery{
  position:relative;
  width:100%;
  height:260px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* CARD */
.card{
  position:absolute;
  width:200px;   /* slightly bigger */
  height:260px;
  border-radius:20px;
  overflow:hidden;
  border:4px solid #ff7eb3;
  box-shadow:0 0 20px #ff7eb3;
  transition:0.4s ease;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* POSITIONS */
.left{
  transform:translateX(-120px) scale(0.8);
  opacity:0.6;
  z-index:1;
}

.center{
  transform:translateX(0) scale(1);
  z-index:5;
}

.right{
  transform:translateX(120px) scale(0.8);
  opacity:0.6;
  z-index:1;
}

.hidden{
  opacity:0;
  pointer-events:none;
}

</style>
</head>

<body>

<div class="container">

<!-- TOP -->
<div class="top-photo">
  <img src="IMG-20251110-WA0009.jpg">
</div>

<!-- TEXT -->
<div class="text">
  <h1>Rekha</h1>
  <p>
    Dear Rekha,<br><br>
    Wishing you a day filled with joy 🌸<br>
    May every smile become a memory 💕<br>
    Stay happy always ✨
  </p>
</div>

<!-- GALLERY -->
<div class="gallery" id="gallery">
  <div class="card"><img src="IMG-20251110-WA0009.jpg"></div>
  <div class="card"><img src="IMG-20251203-WA0119.jpg"></div>
  <div class="card"><img src="IMG_20250916_154443_953.jpg"></div>
  <div class="card"><img src="IMG_20250916_154446_467.jpg"></div>
  <div class="card"><img src="IMG_20251011_234058_532.jpg"></div>
</div>

</div>

<script>

/* SLIDESHOW STATE */
let index = 0;
const cards = [...document.querySelectorAll('.card')];

/* RENDER */
function render(){
  cards.forEach((c,i)=>{
    c.className='card';

    if(i===index) c.classList.add('center');
    else if(i===index-1 || (index===0 && i===cards.length-1))
      c.classList.add('left');
    else if(i===index+1 || (index===cards.length-1 && i===0))
      c.classList.add('right');
    else
      c.classList.add('hidden');

    /* CLICK TO CENTER */
    c.onclick = () => {
      index = i;
      render();
    };
  });
}

/* SWIPE CONTROL */
let startX=0;

document.getElementById('gallery').addEventListener('touchstart',e=>{
  startX=e.touches[0].clientX;
});

document.getElementById('gallery').addEventListener('touchend',e=>{
  let endX=e.changedTouches[0].clientX;

  if(startX-endX>50) next();
  if(endX-startX>50) prev();
});

function next(){
  index=(index+1)%cards.length;
  render();
}

function prev(){
  index=(index-1+cards.length)%cards.length;
  render();
}

/* INIT */
render();

</script>

</body>
</html>
