<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Rekha 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:radial-gradient(circle,#1a1115,#000);
  color:white;
  overflow:hidden;
}

/* SECTION */
section{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

/* TOP PHOTO CENTER */
.top-photo{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:110px;
  height:110px;
  border-radius:50%;
  border:4px solid #ff7eb3;
  box-shadow:0 0 25px #ff7eb3;
  overflow:hidden;
}
.top-photo img{width:100%;height:100%;object-fit:cover;}

h1{color:gold;margin-top:140px;font-family:'Playfair Display';}

/* GALLERY */
.gallery{
  position:relative;
  width:100%;
  height:260px;
  margin-top:30px;
}

/* CARD */
.card{
  position:absolute;
  width:170px;
  height:230px;
  border-radius:20px;
  overflow:hidden;
  border:4px solid #ff7eb3;
  box-shadow:0 0 20px #ff7eb3;
  transition:0.5s ease;
}
.card img{width:100%;height:100%;object-fit:cover;}

/* FLOAT VIEWER (NON BLOCKING) */
.viewer{
  position:fixed;
  bottom:20px;
  right:20px;
  width:140px;
  height:180px;
  border-radius:15px;
  overflow:hidden;
  border:3px solid #fff;
  display:none;
  z-index:50;
}
.viewer img{width:100%;height:100%;object-fit:cover;}

/* HEART PARTICLES */
.heart{
  position:absolute;
  color:#ff7eb3;
  font-size:20px;
  animation:float 6s linear infinite;
  opacity:0.7;
}

@keyframes float{
  0%{transform:translateY(100vh) scale(0.5);}
  100%{transform:translateY(-10vh) scale(1);}
}

.hidden{display:none;}
</style>
</head>

<body>

<section id="main">

<div class="top-photo">
<img src="IMG-20251110-WA0009.jpg">
</div>

<h1>Rekha</h1>

<p>
Dear Rekha,<br><br>
Wishing you a day filled with joy 🌸<br>
May every smile become a memory 💕<br>
Stay happy always ✨
</p>

<div class="gallery" id="gallery">
<div class="card"><img src="IMG-20251110-WA0009.jpg"></div>
<div class="card"><img src="IMG-20251203-WA0119.jpg"></div>
<div class="card"><img src="IMG_20250916_154443_953.jpg"></div>
<div class="card"><img src="IMG_20250916_154446_467.jpg"></div>
<div class="card"><img src="IMG_20251011_234058_532.jpg"></div>
</div>

</section>

<!-- FLOAT VIEW -->
<div class="viewer" id="viewer">
<img id="viewImg">
</div>

<script>

/* ARRANGE */
let index=0;
const cards=[...document.querySelectorAll('.card')];

function update(){
  cards.forEach((c,i)=>{
    let pos=(i-index+cards.length)%cards.length;
    let offset=pos-2;

    c.style.transform=`translateX(${offset*100}px) scale(${pos==2?1:0.8})`;
    c.style.zIndex=pos==2?5:1;
    c.style.opacity=Math.abs(offset)>2?0:1;

    c.onclick=()=>{
      document.getElementById('viewer').style.display='block';
      document.getElementById('viewImg').src=c.querySelector('img').src;
    }
  });
}

/* AUTO SLIDE */
setInterval(()=>{
  index=(index+1)%cards.length;
  update();
},3000);

/* INIT */
update();

/* HEART PARTICLES */
function createHeart(){
  const h=document.createElement('div');
  h.className='heart';
  h.innerHTML='❤';
  h.style.left=Math.random()*100+'%';
  h.style.fontSize=(15+Math.random()*20)+'px';
  h.style.animationDuration=(4+Math.random()*3)+'s';
  document.body.appendChild(h);

  setTimeout(()=>h.remove(),7000);
}

setInterval(createHeart,500);

</script>

</body>
</html>
