<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Rekha 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle,#12080c,#000);
  color:white;
  overflow:hidden;
}

/* SECTION */
section{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

/* TOP IMAGE (STABLE + PREMIUM) */
.top-photo{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:110px;
  height:110px;
  border-radius:50%;
  border:4px solid #ff7eb3;
  box-shadow:0 0 25px #ff7eb3;
  overflow:hidden;
  animation: pulse 2s infinite;
}
.top-photo img{width:100%;height:100%;object-fit:cover;}

@keyframes pulse{
  0%,100%{box-shadow:0 0 20px #ff7eb3;}
  50%{box-shadow:0 0 40px #ff7eb3;}
}

/* TEXT */
h1{
  color:gold;
  margin-top:140px;
  font-family:'Playfair Display';
}

/* RADIAL CAROUSEL */
.carousel{
  position:relative;
  width:300px;
  height:300px;
  margin-top:40px;
}

/* CARD */
.card{
  position:absolute;
  width:150px;
  height:200px;
  border-radius:20px;
  overflow:hidden;
  border:3px solid #ff7eb3;
  box-shadow:0 0 15px #ff7eb3;
  transition:0.6s ease;
}
.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CENTER VIEW (NO UI BREAK) */
.viewer{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  width:80%;
  max-width:350px;
  border-radius:20px;
  overflow:hidden;
  z-index:50;
  transition:0.4s ease;
}
.viewer img{
  width:100%;
}

/* ACTIVE VIEW */
.viewer.show{
  transform:translate(-50%,-50%) scale(1);
}

/* BACK BLUR (NOT HIDING TEXT COMPLETELY) */
.blur{
  filter:blur(6px);
  opacity:0.3;
}

/* HEARTS */
.heart{
  position:absolute;
  color:#ff7eb3;
  animation:float 6s linear infinite;
}
@keyframes float{
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-10vh);}
}

</style>
</head>

<body>

<section id="main">

<div class="top-photo">
<img src="IMG-20251110-WA0009.jpg">
</div>

<h1>Rekha</h1>

<p id="text">
Dear Rekha,<br><br>
Wishing you a day filled with joy 🌸<br>
May every smile become a memory 💕<br>
Stay happy always ✨
</p>

<div class="carousel" id="carousel">
  <div class="card"><img src="IMG-20251110-WA0009.jpg"></div>
  <div class="card"><img src="IMG-20251203-WA0119.jpg"></div>
  <div class="card"><img src="IMG_20250916_154443_953.jpg"></div>
  <div class="card"><img src="IMG_20250916_154446_467.jpg"></div>
  <div class="card"><img src="IMG_20251011_234058_532.jpg"></div>
</div>

</section>

<div class="viewer" id="viewer">
<img id="viewImg">
</div>

<script>

/* RADIAL POSITIONING */
const cards=[...document.querySelectorAll('.card')];
let angle=0;

function arrange(){
  const radius=120;
  cards.forEach((c,i)=>{
    let theta=(i*(2*Math.PI/cards.length))+angle;

    let x=radius*Math.cos(theta);
    let y=radius*Math.sin(theta);

    c.style.transform=`translate(${x}px,${y}px) scale(${y>0?1:0.8})`;
    c.style.zIndex = Math.floor(y+200);

    c.onclick=()=>{
      document.getElementById('viewer').classList.add('show');
      document.getElementById('viewImg').src=c.querySelector('img').src;
      document.getElementById('text').classList.add('blur');
    }
  });
}

/* AUTO ROTATE */
setInterval(()=>{
  angle+=0.02;
  arrange();
},30);

arrange();

/* CLOSE VIEW */
document.getElementById('viewer').onclick=()=>{
  document.getElementById('viewer').classList.remove('show');
  document.getElementById('text').classList.remove('blur');
};

/* HEARTS */
function heart(){
  let h=document.createElement('div');
  h.className='heart';
  h.innerHTML='❤';
  h.style.left=Math.random()*100+'%';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
}
setInterval(heart,500);

</script>

</body>
</html>
