<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Rekha 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at center, #1a1115, #000);
  color: white;
  overflow-x: hidden;
}section { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }

h1 { font-family: 'Playfair Display', serif; font-size: 3rem; color: gold; }

/* HERO IMAGE */ .hero { width: 220px; height: 220px; border-radius: 50%; overflow: hidden; border: 5px solid #ff7eb3; box-shadow: 0 0 30px rgba(255,126,179,0.6); animation: float 4s ease-in-out infinite; }

.hero img { width: 100%; height: 100%; object-fit: cover; }

@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

/* 3D GALLERY */ .gallery-container { perspective: 1000px; margin-top: 30px; }

.gallery { width: 200px; height: 300px; position: relative; transform-style: preserve-3d; transition: transform 1s; }

.gallery img { position: absolute; width: 100%; height: 100%; object-fit: cover; border-radius: 20px; border: 4px solid #ff7eb3; box-shadow: 0 0 20px rgba(255,126,179,0.5); }

/* BUTTON */ button { padding: 15px 30px; border-radius: 30px; border: none; background: linear-gradient(45deg,#ff7eb3,#8b5cf6); color: white; font-size: 1.2rem; cursor: pointer; }

.hidden { display:none; } </style>

</head>
<body><section id="start">
  <h1>🎁 A Surprise</h1>
  <button onclick="start()">Open</button>
</section><section id="main" class="hidden">
  <div class="hero">
    <img src="IMG-20251110-WA0009.jpg">
  </div>  <h1 id="name"></h1>  <p>
    Wishing you a day filled with joy, laughter, and beautiful moments 🌸<br>
    May every smile turn into a memory 💕
  </p>  <div class="gallery-container">
    <div class="gallery" id="gallery">
      <img src="IMG-20251110-WA0009.jpg" style="transform: rotateY(0deg) translateZ(300px)">
      <img src="IMG-20251203-WA0119.jpg" style="transform: rotateY(72deg) translateZ(300px)">
      <img src="IMG_20250916_154443_953.jpg" style="transform: rotateY(144deg) translateZ(300px)">
      <img src="IMG_20250916_154446_467.jpg" style="transform: rotateY(216deg) translateZ(300px)">
      <img src="IMG_20251011_234058_532.jpg" style="transform: rotateY(288deg) translateZ(300px)">
    </div>
  </div>
</section><script>
function start() {
  document.getElementById('start').classList.add('hidden');
  document.getElementById('main').classList.remove('hidden');
  animateName('Rekha');
  rotateGallery();
}

function animateName(text) {
  let el = document.getElementById('name');
  el.innerHTML = '';
  text.split('').forEach((c,i)=>{
    let span=document.createElement('span');
    span.textContent=c;
    span.style.opacity=0;
    span.style.animation=`fade 0.5s ${i*0.2}s forwards`;
    el.appendChild(span);
  });
}

function rotateGallery(){
  let g=document.getElementById('gallery');
  let angle=0;
  setInterval(()=>{
    angle+=72;
    g.style.transform=`rotateY(${angle}deg)`;
  },2000);
}
</script><style>
@keyframes fade { to { opacity:1 } }
</style></body>
</html>
